name: Security Scan

on:
  workflow_call:
    inputs:
      java-version:
        description: Version of Java set up for the build. See actions/setup-java documentation for values.
        type: string
        required: false
      java-cache:
        description: What kind of Java dependency cache to set up. See actions/setup-java documentation for values.
        type: string
        required: false

permissions:
  security-events: write

  # Private repo support
  contents: read # For actions/checkout
  actions: read # For github/codeql-action/upload-sarif

jobs:
  scan:
    runs-on: ubuntu-latest # Provides `jq`
    steps:
      - name: Check out plugin
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version || '21' }}
          cache: ${{ inputs.java-cache }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL
        id: generate-sarif
        uses: github/codeql-action/analyze@v3
        with:
          category: Security Scan
          upload: failure-only

      - name: Archive SARIF
        uses: actions/upload-artifact@v4
        with:
          path: '*.sarif'
          name: Security Scan SARIF

      - name: Upload Scan Result
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: Security Scan
