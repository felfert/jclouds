name: PR Check

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - run: |
          sudo apt-get update
          sudo apt-get install -y colorized-logs
      - name: Build
        id: build
        continue-on-error: true
        run: |
          mvn -B -fae -Dstyle.color=always clean verify checkstyle:checkstyle 2>&1 | tee ../build.log
          RES=$?
          if [ $RES -ne 0 ] ; then
            ansi2html < ../build.log > ../build.log.html
          fi
          exit $RES
      - name Notify about failure
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v11
        with:
          server_address: ${{secrets.SMTP_SERVER}}
          ignore_cert: false
          username: ${{secrets.SMTP_USER}}
          password: ${{secrets.SMTP_PASSWORD}}
          from: "JClouds PR" <noreply@github.com>
          to: ${{secrets.PR_FAILURE_RECIPIENT}}
          subject: "PR build failed"
          body: "The build, triggered by ${{ github.actor }} failed. See the attached build log".
          attachments: ../build.log.html

  scan:
      if false;
      uses: ./.github/workflows/security-scan.yaml
      secrets: inherit
      with:
        java-version: "17"
        java-cache: maven
