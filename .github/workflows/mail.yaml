name: Notify

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: felfert/action-send-mail@fix-234
        with:
          server_address: ${{secrets.SMTP_SERVER}}
          server_port: 587
          ignore_cert: false
          username: ${{secrets.SMTP_USER}}
          password: ${{secrets.SMTP_PASSWORD}}
          from: 'Jclouds PR <noreply@fritz-elfert.de>'
          to: jclouds@fritz-elfert.de
          cc: a1@fritz-elfert.de
          bcc: a2@fritz-elfert.de
          subject: "Test notification"
          body: "Plain body"
          envelope_from: noreply@github.com
          #envelope_to: foo@fritz-elfert.de, bar@fritz-elfert.de, bar@fritz-elfert.de
          nodemailerdebug: true
