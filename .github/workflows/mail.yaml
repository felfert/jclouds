name: Notify

on:
  workflow_dispatch:
    inputs:
      testfrom:
        required: false
      testto:
        required: false

jobs:
  notify1:
    runs-on: ubuntu-latest
    steps:
      - name: without
        if:  ${{ github.event.inputs.testfrom == '' || github.event.inputs.testto == '' }}
        uses: felfert/action-send-mail@fix-234
        with:
          server_address: ${{secrets.SMTP_SERVER}}
          server_port: 587
          ignore_cert: false
          username: ${{secrets.SMTP_USER}}
          password: ${{secrets.SMTP_PASSWORD}}
          from: 'Jclouds PR <noreply@github.com>'
          to: me@fritz-elfert.de
          subject: "Test notification"
          body: "Plain body"
          envelope_from: myself,
          envelope_to: foo, bar, baz,, <me@fritz-elfert.de>,
          nodemailerdebug: true
      - name: with
        if: ${{ github.event.inputs.testfrom != '' && github.event.inputs.testto != '' }}
        uses: felfert/action-send-mail@fix-234
        with:
          server_address: ${{secrets.SMTP_SERVER}}
          server_port: 587
          ignore_cert: false
          username: ${{secrets.SMTP_USER}}
          password: ${{secrets.SMTP_PASSWORD}}
          from: ${{ github.event.inputs.testfrom }}
          to: me@fritz-elfert.de
          subject: "Test notification"
          body: "Plain body"
          envelope_to:  ${{ github.event.inputs.testto }}
          nodemailerdebug: true
