name: PR Check

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - run: |
          sudo apt-get update
          sudo apt-get install -y colorized-logs
      - name: Build
        id: build
        run: mvn -B -fae -Dstyle.color=always clean verify checkstyle:checkstyle 2>&1 | tee ../build.log
      - run: |
          echo "ansi2html:"
          which ansi2html
          echo "build log:"
          ls -l ../build.log

  scan:
      uses: ./.github/workflows/security-scan.yaml
      secrets: inherit
      with:
        java-version: "17"
        java-cache: maven
